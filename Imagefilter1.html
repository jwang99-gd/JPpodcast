<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Image → Magnetic Pattern</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .tool-wrapper {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .preview {
      flex: 1;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .imageBox {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .imageBox img {
      display: none;
      max-width: 220px;
      max-height: 220px;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid #444;
      background: white;
    }

    .canvasSection {
      flex: 1;
      min-width: 0;
    }

    #canvasContainer canvas {
      max-width: 100%;
      height: auto !important;
    }

    canvas {
      border: 1px solid #444;
      display: block;
    }

    label {
      font-size: 13px;
    }

    input, button {
      width: 100%;
    }

    button {
      padding: 10px;
      background: white;
      border: none;
      cursor: pointer;
    }

    h2 {
      margin-top: 0;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .tool-wrapper {
        flex-direction: column;
      }

      .panel {
        width: 100%;
      }

      .preview {
        width: 100%;
        flex-direction: column;
      }

      .imageBox img {
        max-width: 160px;
        max-height: 160px;
      }

      .canvasSection {
        width: 100%;
      }

      #canvasContainer canvas {
        width: 100% !important;
        height: auto !important;
      }
    }
  </style>
</head>

<body>

  <div class="tool-wrapper">

    <div class="panel">
      <h2>Magnetic Pattern Tool</h2>

      <input type="file" id="upload" accept="image/*">

      <label>Threshold</label>
      <input type="range" id="threshold" min="0" max="255" value="120">

      <label>Stroke Density</label>
      <input type="range" id="density" min="2" max="20" value="7">

      <label>Line Length</label>
      <input type="range" id="length" min="5" max="80" value="35">

      <label>Noise Distortion</label>
      <input type="range" id="noise" min="0" max="2" step="0.01" value="0.65">

      <label>Explosion Strength</label>
      <input type="range" id="force" min="0" max="3" step="0.01" value="1.4">

      <label>Stroke Weight</label>
      <input type="range" id="strokeWeight" min="0.3" max="8" step="0.1" value="2.2">

      <label>Stroke Color</label>
      <input type="color" id="strokeColor" value="#000000">

      <label>Background Color</label>
      <input type="color" id="bgColor" value="#ffffff">

      <button onclick="redraw()">Generate</button>
      <button onclick="saveCanvas('magnetic-pattern', 'png')">Save PNG</button>
    </div>

    <div class="preview">

      <div class="imageBox">
        <h3>Original Image</h3>
        <img id="previewImage" src="" alt="Preview">
      </div>

      <div class="canvasSection">
        <h3>Generated Pattern</h3>
        <div id="canvasContainer"></div>
      </div>

    </div>

  </div>

  <script>
    let img;
    let outputW = 900;
    let outputH = 900;
    let maxOutputSize = 900;

    function setup() {
      let c = createCanvas(outputW, outputH);
      c.parent("canvasContainer");

      pixelDensity(2);
      noLoop();

      document.getElementById("upload").addEventListener("change", handleFile);

      [
        "threshold",
        "density",
        "length",
        "noise",
        "force",
        "strokeWeight",
        "strokeColor",
        "bgColor"
      ].forEach(id => {
        document.getElementById(id).addEventListener("input", redraw);
      });
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);

      const preview = document.getElementById("previewImage");
      preview.src = url;

      preview.onload = () => {
        preview.style.display = "block";
      };

      loadImage(url, loaded => {
        const scale = maxOutputSize / max(loaded.width, loaded.height);

        outputW = floor(loaded.width * scale);
        outputH = floor(loaded.height * scale);

        resizeCanvas(outputW, outputH);

        img = loaded;
        img.resize(outputW, outputH);

        redraw();
      });
    }

    function draw() {
      const bgColor = document.getElementById("bgColor").value;
      const strokeColor = document.getElementById("strokeColor").value;

      background(bgColor);

      if (!img) {
        fill(strokeColor);
        noStroke();
        textAlign(CENTER, CENTER);
        textSize(22);
        text("Upload an image", width / 2, height / 2);
        return;
      }

      img.loadPixels();

      const threshold = Number(document.getElementById("threshold").value);
      const density = Number(document.getElementById("density").value);
      const lineLength = Number(document.getElementById("length").value);
      const noiseAmount = Number(document.getElementById("noise").value);
      const force = Number(document.getElementById("force").value);
      const sw = Number(document.getElementById("strokeWeight").value);

      stroke(strokeColor);
      strokeWeight(sw);
      noFill();

      let centers = findDarkCenters(threshold);

      for (let y = 0; y < height; y += density) {
        for (let x = 0; x < width; x += density) {
          let b = brightnessAt(x, y);

          if (b < threshold) {
            let center = nearestCenter(x, y, centers);

            let dx = x - center.x;
            let dy = y - center.y;
            let angle = atan2(dy, dx);

            let n = noise(x * 0.01, y * 0.01);
            angle += map(n, 0, 1, -PI, PI) * noiseAmount;

            let darkness = map(b, 0, threshold, 1, 0);
            let len = lineLength * darkness * random(0.4, 1.4);

            let pull = force * darkness;

            let x1 = x - cos(angle) * len * 0.2;
            let y1 = y - sin(angle) * len * 0.2;
            let x2 = x + cos(angle) * len * pull;
            let y2 = y + sin(angle) * len * pull;

            line(x1, y1, x2, y2);
          }
        }
      }

      stroke(strokeColor);

      for (let i = 0; i < 9000; i++) {
        let x = random(width);
        let y = random(height);
        let b = brightnessAt(x, y);

        if (b < threshold + 40 && random() < 0.35) {
          strokeWeight(random(0.4, sw));
          point(x, y);
        }
      }
    }

    function brightnessAt(x, y) {
      x = constrain(floor(x), 0, img.width - 1);
      y = constrain(floor(y), 0, img.height - 1);

      let index = 4 * (y * img.width + x);

      let r = img.pixels[index];
      let g = img.pixels[index + 1];
      let b = img.pixels[index + 2];

      return (r + g + b) / 3;
    }

    function findDarkCenters(threshold) {
      let centers = [];
      let grid = 120;

      for (let y = grid / 2; y < height; y += grid) {
        for (let x = grid / 2; x < width; x += grid) {
          let totalX = 0;
          let totalY = 0;
          let count = 0;

          for (let yy = y - grid / 2; yy < y + grid / 2; yy += 8) {
            for (let xx = x - grid / 2; xx < x + grid / 2; xx += 8) {
              if (brightnessAt(xx, yy) < threshold) {
                totalX += xx;
                totalY += yy;
                count++;
              }
            }
          }

          if (count > 10) {
            centers.push({
              x: totalX / count,
              y: totalY / count
            });
          }
        }
      }

      if (centers.length === 0) {
        centers.push({
          x: width / 2,
          y: height / 2
        });
      }

      return centers;
    }

    function nearestCenter(x, y, centers) {
      let closest = centers[0];
      let minDist = Infinity;

      for (let c of centers) {
        let d = dist(x, y, c.x, c.y);

        if (d < minDist) {
          minDist = d;
          closest = c;
        }
      }

      return closest;
    }
  </script>
</body>
</html>
